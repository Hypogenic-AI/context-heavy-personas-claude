idea:
  title: Context Heavy Personas
  domain: nlp
  hypothesis: 'Certain personas in large language models can only be occupied after
    conditioning on very large contexts (e.g., 10,000 or 100,000 tokens). If such
    context-dependent personas do not exist, this may imply limits on the total number
    of personas an LLM can represent.

    '
  background:
    description: 'LLMs do more interesting things conditioned on more data. Are there
      also certain personas that can only be occupied after 10,000 tokens or 100,000
      tokens. If there aren''t, what does that mean about the total number of personas?

      '
